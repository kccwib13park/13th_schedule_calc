<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스케줄 가능 여부 계산기</title>
    <style>
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            padding: 15px;
            margin: 0;
            box-sizing: border-box;
        }
        .container {
            background-color: white;
            padding: 25px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
        }
        h2 { text-align: center; color: #1f2937; margin-top: 0; font-size: 20px; }
        .section-title { font-size: 15px; font-weight: bold; color: #4b5563; margin-top: 25px; margin-bottom: 15px; border-bottom: 2px solid #e5e7eb; padding-bottom: 8px; }
        .input-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .input-group label { font-size: 14px; color: #374151; flex: 1; }
        .input-group input[type="number"] { width: 60px; padding: 8px; text-align: center; border: 1px solid #d1d5db; border-radius: 6px; font-size: 15px; }
        .input-group input[type="date"] { width: 130px; padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; font-family: inherit; }
        input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        button { width: 100%; padding: 14px; background-color: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 25px; transition: background-color 0.2s; -webkit-tap-highlight-color: transparent; }
        button:hover { background-color: #2563eb; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-size: 14px; line-height: 1.6; word-break: keep-all; }
        .success { background-color: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .error { background-color: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .summary { margin-top: 10px; font-size: 13px; color: #6b7280; border-top: 1px dashed #ccc; padding-top: 10px;}
    </style>
</head>
<body>

<div class="container">
    <h2>🗓️ 스케줄 가능 여부 계산기</h2>

    <div class="section-title">근무 기간 설정</div>
    <div class="input-group">
        <label>시작일</label>
        <input type="date" id="start_date" value="2026-05-04">
    </div>
    <div class="input-group">
        <label>종료일</label>
        <input type="date" id="end_date" value="2026-05-31">
    </div>

    <div class="section-title">인원 및 휴일 설정</div>
    <div class="input-group"><label>총 인원 수 (명)</label><input type="number" id="workers" value="4"></div>
    <div class="input-group"><label>1인당 휴일 수</label><input type="number" id="basic" value="8"></div>
    <div class="input-group"><label>1인당 공휴 수</label><input type="number" id="bonus" value="2"></div>

    <div class="section-title">요일별 필수 근무 인원</div>
    <div class="input-group"><label>월요일</label><input type="number" id="mon" value="3"></div>
    <div class="input-group"><label>화요일</label><input type="number" id="tue" value="3"></div>
    <div class="input-group"><label>수요일</label><input type="number" id="wed" value="3"></div>
    <div class="input-group"><label>목요일</label><input type="number" id="thu" value="3"></div>
    <div class="input-group"><label>금요일</label><input type="number" id="fri" value="3"></div>
    <div class="input-group"><label>토요일</label><input type="number" id="sat" value="3"></div>
    <div class="input-group"><label>일요일</label><input type="number" id="sun" value="1"></div>

    <button onclick="calculate()">계산하기</button>

    <div id="result"></div>
</div>

<script>
    function calculate() {
        try {
            // 1. 날짜 가져오기 (빈칸 방지)
            const startDateStr = document.getElementById('start_date').value;
            const endDateStr = document.getElementById('end_date').value;
            
            if (!startDateStr || !endDateStr) {
                alert("달력에서 시작일과 종료일을 모두 선택해주세요.");
                return;
            }

            // PC 브라우저별 시간대 차이(Timezone) 버그 방지를 위해 -를 /로 치환
            const startDate = new Date(startDateStr.replace(/-/g, '/'));
            const endDate = new Date(endDateStr.replace(/-/g, '/'));
            endDate.setHours(23, 59, 59); // 종료일을 그 날의 끝 시간으로 맞춰 오차 방지

            if (startDate > endDate) {
                alert("종료일이 시작일보다 빠를 수 없습니다.");
                return;
            }

            // 2. 선택된 기간 내 요일별 개수 계산
            let current = new Date(startDate);
            let dayCounts = [0, 0, 0, 0, 0, 0, 0]; // 0:일 ~ 6:토
            let totalDays = 0;

            while (current <= endDate) {
                dayCounts[current.getDay()]++;
                current.setDate(current.getDate() + 1);
                totalDays++;
            }

            // 3. 인원 및 휴일 설정 가져오기 (빈칸일 경우 0으로 자동 처리)
            const workers = Number(document.getElementById('workers').value) || 0;
            const basic = Number(document.getElementById('basic').value) || 0;
            const bonus = Number(document.getElementById('bonus').value) || 0;

            // 4. 요일별 필수 인원 가져오기
            const req = [
                Number(document.getElementById('sun').value) || 0,
                Number(document.getElementById('mon').value) || 0,
                Number(document.getElementById('tue').value) || 0,
                Number(document.getElementById('wed').value) || 0,
                Number(document.getElementById('thu').value) || 0,
                Number(document.getElementById('fri').value) || 0,
                Number(document.getElementById('sat').value) || 0
            ];

            // 5. 총 계산 수행
            let totalReqShifts = 0;
            for (let i = 0; i < 7; i++) {
                totalReqShifts += dayCounts[i] * req[i];
            }

            const totalHolidays = basic + bonus;
            const totalAvailShifts = workers * (totalDays - totalHolidays);
            const diff = totalReqShifts - totalAvailShifts;

            // 6. 화면에 결과 출력
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';

            let summaryHtml = `<div class="summary">총 ${totalDays}일 (필요 근무: ${totalReqShifts}회 / 가능 근무: ${totalAvailShifts}회)</div>`;

            if (diff <= 0) {
                resultDiv.className = 'success';
                resultDiv.innerHTML = `✅ <b>스케줄 작성이 가능합니다!</b><br><br>남는 여유 근무 횟수: <b>${Math.abs(diff)}회</b>` + summaryHtml;
            } else {
                resultDiv.className = 'error';
                resultDiv.innerHTML = `❌ <b>스케줄 작성이 불가능합니다.</b><br><br>필요한 근무가 <b>${diff}회</b> 부족합니다.<br>필수 근무 인원을 줄여야 하는 날은 최소 <b>${diff}일</b>입니다.` + summaryHtml;
            }
        } catch (e) {
            console.error("오류 발생:", e);
            alert("계산 중 알 수 없는 오류가 발생했습니다.");
        }
    }
</script>

</body>
</html>
