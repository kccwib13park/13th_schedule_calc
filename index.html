<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스케줄 가능 여부 계산기</title>
    <style>
        /* 모바일 친화적 반응형 디자인 */
        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            padding: 15px; /* 모바일 여백 최소화 */
            margin: 0;
            box-sizing: border-box;
        }
        .container {
            background-color: white;
            padding: 25px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            max-width: 400px; /* 약간 넓힘 */
            width: 100%;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: #1f2937;
            margin-top: 0;
            font-size: 20px;
        }
        .section-title {
            font-size: 15px;
            font-weight: bold;
            color: #4b5563;
            margin-top: 25px;
            margin-bottom: 15px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 8px;
        }
        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .input-group label {
            font-size: 14px;
            color: #374151;
            flex: 1;
        }
        /* 숫자 입력칸 */
        .input-group input[type="number"] {
            width: 60px;
            padding: 8px;
            text-align: center;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 15px;
        }
        /* 날짜 입력칸 (달력) */
        .input-group input[type="date"] {
            width: 130px;
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        button {
            width: 100%;
            padding: 14px; /* 터치 영역 확대 */
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            transition: background-color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        button:hover {
            background-color: #2563eb;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-size: 14px;
            line-height: 1.6;
            word-break: keep-all;
        }
        .success { background-color: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .error { background-color: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
        .summary { margin-top: 10px; font-size: 13px; color: #6b7280; border-top: 1px dashed #ccc; padding-top: 10px;}
    </style>
</head>
<body>

<div class="container">
    <h2>🗓️ 스케줄 가능 여부 계산기</h2>

    <div class="section-title">근무 기간 설정</div>
    <div class="input-group">
        <label>시작일</label>
        <input type="date" id="start_date" value="2026-05-04">
    </div>
    <div class="input-group">
        <label>종료일</label>
        <input type="date" id="end_date" value="2026-05-31">
    </div>

    <div class="section-title">인원 및 휴일 설정</div>
    <div class="input-group">
        <label>총 인원 수 (명)</label>
        <input type="number" id="workers" value="4">
    </div>
    <div class="input-group">
        <label>1인당 휴일 수</label>
        <input type="number" id="basic" value="8">
    </div>
    <div class="input-group">
        <label>1인당 공휴 수</label>
        <input type="number" id="bonus" value="2">
    </div>

    <div class="section-title">요일별 필수 근무 인원</div>
    <div class="input-group"><label>월요일</label><input type="number" id="mon" value="3"></div>
    <div class="input-group"><label>화요일</label><input type="number" id="tue" value="3"></div>
    <div class="input-group"><label>수요일</label><input type="number" id="wed" value="3"></div>
    <div class="input-group"><label>목요일</label><input type="number" id="thu" value="3"></div>
    <div class="input-group"><label>금요일</label><input type="number" id="fri" value="3"></div>
    <div class="input-group"><label>토요일</label><input type="number" id="sat" value="3"></div>
    <div class="input-group"><label>일요일</label><input type="number" id="sun" value="1"></div>

    <button onclick="calculate()">계산하기</button>

    <div id="result"></div>
</div>

<script>
    function calculate() {
        try {
            // 1. 날짜 가져오기 및 유효성 검사
            const startDateStr = document.getElementById('start_date').value;
            const endDateStr = document.getElementById('end_date').value;
            
            if (!startDateStr || !endDateStr) {
                alert("시작일과 종료일을 모두 선택해주세요.");
                return;
            }

            const startDate = new Date(startDateStr);
            const endDate = new Date(endDateStr);

            if (startDate > endDate) {
                alert("종료일이 시작일보다 빠를 수 없습니다.");
                return;
            }

            // 2. 선택된 기간 내 요일별 개수 세기 및 총 일수 계산
            let current = new Date(startDate);
            let dayCounts = [0, 0, 0, 0, 0, 0, 0]; // 0:일, 1:월, ..., 6:토
            let totalDays = 0;

            while (current <= endDate) {
                dayCounts[current.getDay()]++;
                current.setDate(current.getDate() + 1);
                totalDays++;
            }

            // 3. 인원 및 휴일 설정 가져오기
            const workers = parseInt(document.getElementById('workers').value);
            const basic = parseInt(document.getElementById('basic').value);
            const bonus = parseInt(document.getElementById('bonus').value);

            // 4. 요일별 필수 인원 가져오기 (0:일 ~ 6:토)
            const req = [
                parseInt(document.getElementById('sun').value),
                parseInt(document.getElementById('mon').value),
                parseInt(document.getElementById('tue').value),
                parseInt(document.getElementById('wed').value),
                parseInt(document.getElementById('thu').value),
                parseInt(document.getElementById('fri').value),
                parseInt(document.getElementById('sat').value)
            ];

            // 5. 필요 근무 횟수 vs 가능 근무 횟수 계산
            let totalReqShifts = 0;
            for (let i = 0; i < 7; i++) {
                totalReqShifts += dayCounts[i] * req[i];
            }

            const totalHolidays = basic + bonus;
            const totalAvailShifts = workers * (totalDays - totalHolidays);
            const diff = totalReqShifts - totalAvailShifts;

            // 6. 결과 출력
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';

            let summaryHtml = `<div class="summary">총 ${totalDays}일 (필요 근무: ${totalReqShifts}회 / 가능 근무: ${totalAvailShifts}회)</div>`;

            if (diff <= 0) {
                resultDiv.className = 'success';
